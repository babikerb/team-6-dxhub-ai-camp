AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  SoftwareRequests API - 5 endpoints per Implementation_Plan.md API Contract,
  plus S3-triggered review document handling.
  The S3EventFunction trigger is wired after deploy via AWS CLI because the
  bucket already exists and SAM cannot attach notifications to pre-existing buckets.

Parameters:
  SoftwareRequestsTableName:
    Type: String
    Description: Name of the existing DynamoDB table.
    Default: SoftwareRequests

  ReviewDocsBucketName:
    Type: String
    Description: Name of the existing S3 bucket holding reviewer-uploaded documents.
    Default: dxhub-camp-2026-sdsu-software-request-and-institutional-c7fe61

  SesSourceEmail:
    Type: String
    Description: SES-verified "From" address used to send request notification emails.
    Default: sdsusoftwarerequest@gmail.com

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref SoftwareRequestsTableName
        REVIEW_DOCS_BUCKET: !Ref ReviewDocsBucketName

Resources:

  # ── API Gateway ───────────────────────────────────────────────────────────────
  SoftwareRequestsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Cors:
        AllowMethods: "'GET,POST,PATCH,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  # ── Request-handling Lambdas ──────────────────────────────────────────────────
  CreateRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.create_request.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests
            Method: POST

  GetRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.get_request.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SoftwareRequestsTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests/{id}
            Method: GET

  ListRequestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.list_requests.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SoftwareRequestsTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests
            Method: GET

  ChatbotPatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.chatbot_patch.handler
      Environment:
        Variables:
          EMAILS_DISABLED: "false"
          SES_SOURCE_EMAIL: !Ref SesSourceEmail
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests/{id}/chatbot
            Method: PATCH

  AdminPatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.admin_patch.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests/{id}/admin
            Method: PATCH

  # ── Review Documents: S3 event Lambda ────────────────────────────────────────
  # Trigger is wired manually after deploy (see deploy instructions) because
  # SAM cannot attach event notifications to a pre-existing bucket.
  S3EventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.s3_event_handler.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
        - S3ReadPolicy:
            BucketName: !Ref ReviewDocsBucketName

  # ── Review Documents: API endpoint ───────────────────────────────────────────
  ReviewDocsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.get_review_docs.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !Sub "arn:aws:s3:::${ReviewDocsBucketName}"
                - !Sub "arn:aws:s3:::${ReviewDocsBucketName}/DataStored/*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests/{id}/review-docs
            Method: GET

Outputs:
  ApiBaseUrl:
    Description: Base URL for the deployed API
    Value: !Sub "https://${SoftwareRequestsApi}.execute-api.${AWS::Region}.amazonaws.com/dev/"

  S3EventFunctionArn:
    Description: ARN of the S3 event Lambda (needed to wire the S3 trigger)
    Value: !GetAtt S3EventFunction.Arn
