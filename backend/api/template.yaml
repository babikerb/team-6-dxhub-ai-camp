AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  SoftwareRequests API -- intake/chatbot/admin CRUD, Bedrock-powered chatbot
  parsing, the async security-report pipeline (fetch documents, call Bedrock,
  archive to S3), and S3-triggered review document handling. CodeUri is the
  repo's backend/ folder (one level up from this template) so handlers/ and
  chatbot/ deploy together as siblings, matching the relative-path sys.path
  trick the handlers already use locally -- see
  backend/api/handlers/security_report.py and friends.
  The S3EventFunction trigger is wired after deploy via AWS CLI because the
  bucket already exists and SAM cannot attach notifications to pre-existing buckets.

Parameters:
  SoftwareRequestsTableName:
    Type: String
    Description: Name of the existing DynamoDB table.
    Default: SoftwareRequests
  DataBucketName:
    Type: String
    Description: S3 bucket for archived review documents (DataStored/<request_id>/...).
    Default: dxhub-camp-2026-sdsu-software-request-and-institutional-c7fe61

  ReviewDocsBucketName:
    Type: String
    Description: Name of the existing S3 bucket holding reviewer-uploaded documents.
    Default: dxhub-camp-2026-sdsu-software-request-and-institutional-c7fe61

  SesSourceEmail:
    Type: String
    Description: SES-verified "From" address used to send request notification emails.
    Default: sdsusoftwarerequest@gmail.com

  FrontendBaseUrl:
    Type: String
    Description: Base URL of the frontend used in email links (no trailing slash).
    Default: http://localhost:5173

  ReminderDelayMinutes:
    Type: String
    Description: Minutes to wait after form submit before sending the chatbot reminder email.
    Default: "5"

Globals:
  Function:
    Runtime: python3.12
    Timeout: 25
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref SoftwareRequestsTableName
        REVIEW_DOCS_BUCKET: !Ref ReviewDocsBucketName
        SES_SOURCE_EMAIL: !Ref SesSourceEmail
        FRONTEND_BASE_URL: !Ref FrontendBaseUrl
        EMAILS_DISABLED: "false"
        REMINDER_DELAY_MINUTES: !Ref ReminderDelayMinutes

Resources:

  # ── API Gateway ───────────────────────────────────────────────────────────────
  SoftwareRequestsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Cors:
        AllowMethods: "'GET,POST,PATCH,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  # ---- Core CRUD ------------------------------------------------------------
  CreateRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.create_request.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests
            Method: POST

  GetRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.get_request.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SoftwareRequestsTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests/{id}
            Method: GET

  ListRequestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.list_requests.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SoftwareRequestsTableName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests
            Method: GET

  AdminPatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.admin_patch.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests/{id}/admin
            Method: PATCH

  # ---- Chatbot (computes flags; triggers the security-report worker) -------
  ChatbotPatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.chatbot_patch.handler
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
        - LambdaInvokePolicy:
            FunctionName: !Ref SecurityReportWorkerFunction
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
      Environment:
        Variables:
          SECURITY_REPORT_WORKER_FUNCTION_NAME: !Ref SecurityReportWorkerFunction
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests/{id}/chatbot
            Method: PATCH

  # ---- Chatbot reminder (Email 1) — every minute ---------------------------
  ReminderCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.reminder_check.handler
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: Send chatbot reminder emails for stale Submitted requests
            Enabled: true

  # ---- Chatbot Bedrock helpers (answer parsing, conversation, web search) --
  ChatbotParseFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.chatbot_parse.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /chatbot/parse
            Method: POST

  ChatbotConverseFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.chatbot_converse.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /chatbot/converse
            Method: POST

  ChatbotAssistFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.chatbot_assist.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /chatbot/assist
            Method: POST

  ChatbotMatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.chatbot_match.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /chatbot/match-software
            Method: POST

  ChatbotFindDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.chatbot_find_document.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /chatbot/find-document
            Method: POST

  # ---- Security report: trigger (API Gateway, fast) + worker (async, slow) -
  # Split because API Gateway has a hard 29s timeout and Lambda has no
  # equivalent of a "background task" once a response is sent -- see
  # backend/api/handlers/security_report.py's module docstring.
  SecurityReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.security_report.handler
      Timeout: 10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
        - LambdaInvokePolicy:
            FunctionName: !Ref SecurityReportWorkerFunction
      Environment:
        Variables:
          SECURITY_REPORT_WORKER_FUNCTION_NAME: !Ref SecurityReportWorkerFunction
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests/{id}/security-report
            Method: POST

  SecurityReportWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.security_report.worker_handler
      Timeout: 300
      MemorySize: 512
      # No Events -- invoked only via async Lambda "Event" invocation from
      # ChatbotPatchFunction or SecurityReportFunction, never through API
      # Gateway. That's what makes the long timeout safe.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
        - S3WritePolicy:
            BucketName: !Ref DataBucketName
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName

  # ── Review Documents: S3 event Lambda ────────────────────────────────────────
  # Trigger is wired manually after deploy (see deploy instructions) because
  # SAM cannot attach event notifications to a pre-existing bucket.
  S3EventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.s3_event_handler.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
        - S3ReadPolicy:
            BucketName: !Ref ReviewDocsBucketName

  # ── Review Documents: API endpoint ───────────────────────────────────────────
  ReviewDocsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: api.handlers.get_review_docs.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SoftwareRequestsTableName
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !Sub "arn:aws:s3:::${ReviewDocsBucketName}"
                - !Sub "arn:aws:s3:::${ReviewDocsBucketName}/DataStored/*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SoftwareRequestsApi
            Path: /requests/{id}/review-docs
            Method: GET

Outputs:
  ApiBaseUrl:
    Description: Base URL for the deployed API
    Value: !Sub "https://${SoftwareRequestsApi}.execute-api.${AWS::Region}.amazonaws.com/dev/"

  S3EventFunctionArn:
    Description: ARN of the S3 event Lambda (needed to wire the S3 trigger)
    Value: !GetAtt S3EventFunction.Arn
